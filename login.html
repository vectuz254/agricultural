<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — AgroSense</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">

<div class="auth-split">
  <div class="auth-panel">
    <a href="index.html" class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <path d="M14 2C14 2 6 8 6 16a8 8 0 0016 0C22 8 14 2 14 2z" fill="#7AAF8A"/>
        <path d="M14 8C14 8 10 12 10 16a4 4 0 008 0C18 12 14 8 14 8z" fill="#1B3A2D"/>
      </svg>
      AgroSense
    </a>

    <div class="auth-form-wrap">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Sign in to your farm dashboard.</p>

      <div id="authMsg" class="auth-msg" style="display:none"></div>

      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="jane@myfarm.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Your password">
      </div>

      <button class="btn-submit" onclick="handleLogin()">
        <span>Sign In</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <p class="auth-link">No account yet? <a href="register.html">Create one free</a></p>
    </div>
  </div>

  <div class="auth-deco">
    <div class="deco-content">
      <h3>"Finally a farm tool that actually understands our data needs."</h3>
      <p>— David Osei, Ghana Cocoa Growers</p>
    </div>
    <div class="deco-circles">
      <div class="dc dc1"></div>
      <div class="dc dc2"></div>
      <div class="dc dc3"></div>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
