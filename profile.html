<main class="dash-main">
<div class="topbar">
<div>
<h1 class="page-title">My Profile</h1>
<p class="page-date">Manage your account and farm details</p>
</div>
</div>
<div class="chart-card" style="max-width:520px">
<div id="profileMsg" class="auth-msg" style="display:none"></div>
<div class="form-group">
<label for="pfName">Full Name</label>
<input type="text" id="pfName" placeholder="Jane Farmer">
</div>
<div class="form-group">
<label for="pfEmail">Email Address</label>
<input type="email" id="pfEmail" disabled style="opacity:0.6">
</div>
<div class="form-group">
<label for="pfFarmName">Farm Name</label>
<input type="text" id="pfFarmName" placeholder="Green Valley Farm">
</div>
<div class="form-group">
<label for="pfLocation">Location</label>
<input type="text" id="pfLocation" placeholder="Nakuru, Kenya">
</div>
<div class="form-group">
<label for="pfPhone">Phone Number</label>
<input type="text" id="pfPhone" placeholder="+254 7XX XXX XXX">
</div>
<button class="btn-submit" id="saveBtn" onclick="saveProfile()">
<span>Save Changes</span>
</button>
</div>
</main>
</div>
